<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELIZA — DOCTOR Script</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Prevent iOS Safari from scrolling the page itself */
    html {
      height: -webkit-fill-available;
    }

    body {
      background: #0a0a0a;
      color: #33ff33;
      font-family: "Courier New", Courier, monospace;
      font-size: 15px;
      /* 100vh is broken on iOS Safari (ignores browser chrome).
         Fall back chain: fill-available → dvh (dynamic, tracks chrome) */
      min-height: 100vh;
      min-height: -webkit-fill-available;
      min-height: 100dvh;
      height: 100vh;
      height: -webkit-fill-available;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      /* Prevent the page from scrolling behind the fixed layout */
      overflow: hidden;
    }

    header {
      text-align: center;
      padding: 20px 0 10px;
      width: 100%;
      max-width: 700px;
    }

    header h1 {
      font-size: 2em;
      letter-spacing: 0.3em;
      text-shadow: 0 0 10px #33ff33;
    }

    header p {
      color: #228822;
      margin-top: 6px;
      font-size: 0.85em;
    }

    #chat-window {
      flex: 1;
      min-height: 0; /* allow flex child to shrink below its content size on iOS */
      width: 100%;
      max-width: 700px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch; /* smooth momentum scrolling on iOS */
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .message .speaker {
      font-size: 0.75em;
      color: #228822;
      letter-spacing: 0.15em;
    }

    .message .text {
      padding: 8px 12px;
      border-left: 2px solid #33ff33;
      line-height: 1.5;
    }

    .message.eliza .speaker { color: #33ff33; }
    .message.eliza .text {
      border-color: #33ff33;
      color: #33ff33;
    }

    .message.user .speaker { color: #aaffaa; }
    .message.user .text {
      border-color: #aaffaa;
      color: #aaffaa;
    }

    #input-area {
      width: 100%;
      max-width: 700px;
      display: flex;
      gap: 10px;
      padding: 10px 0 20px;
      border-top: 1px solid #228822;
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: 1px solid #33ff33;
      color: #33ff33;
      font-family: inherit;
      font-size: inherit;
      padding: 10px 12px;
      outline: none;
      caret-color: #33ff33;
    }

    #user-input::placeholder { color: #1a6b1a; }
    #user-input:focus { box-shadow: 0 0 8px #33ff3344; }

    #send-btn {
      background: transparent;
      border: 1px solid #33ff33;
      color: #33ff33;
      font-family: inherit;
      font-size: inherit;
      padding: 10px 18px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.15s, color 0.15s;
    }

    #send-btn:hover {
      background: #33ff33;
      color: #0a0a0a;
    }

    .cursor {
      display: inline-block;
      width: 9px;
      height: 1.1em;
      background: #33ff33;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <header>
    <h1>E L I Z A</h1>
    <p>DOCTOR Script &mdash; MIT Artificial Intelligence Laboratory, 1966</p>
  </header>

  <div id="chat-window"></div>

  <div id="input-area">
    <input id="user-input" type="text" placeholder="Tell me what's on your mind..." autocomplete="off" />
    <button id="send-btn">SEND</button>
  </div>

  <script src="eliza.js"></script>
</body>
</html>
